<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dev.history</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..700;1,14..32,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">

  <!-- 헤더 -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">✦</div>
      dev.history
    </div>
    <div class="topbar-right">
      <div class="stats" id="stats-area"></div>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab on" onclick="switchTab('tasks', this)">
      <span class="tab-icon">📋</span> 할 일 관리
    </button>
    <button class="tab" onclick="switchTab('history', this)">
      <span class="tab-icon">📁</span> 개발 히스토리
    </button>
  </div>

  <!-- ===== 할 일 관리 ===== -->
  <div id="section-tasks">

    <div class="form-card">
      <div class="form-card-title">새 할 일 추가</div>
      <div class="form-row form-row-4">
        <div>
          <div class="form-label">유형</div>
          <select id="task-type">
            <option value="기능개발">기능개발</option>
            <option value="버그수정">버그수정</option>
            <option value="CS응대">CS응대</option>
            <option value="장애내역">장애내역</option>
          </select>
        </div>
        <div>
          <div class="form-label">우선순위</div>
          <select id="task-priority">
            <option value="긴급">🔴 긴급</option>
            <option value="보통" selected>🟡 보통</option>
            <option value="낮음">🟢 낮음</option>
          </select>
        </div>
        <div>
          <div class="form-label">시작일</div>
          <input type="date" id="task-start" />
        </div>
        <div>
          <div class="form-label">마감일</div>
          <input type="date" id="task-deadline" />
        </div>
      </div>
      <div class="form-label">제목</div>
      <input type="text" id="task-title" placeholder="어떤 작업인가요?" />
      <div class="form-label">설명</div>
      <textarea id="task-description" placeholder="작업 내용을 자유롭게 적어봐요"></textarea>
      <div class="form-label">태그 (쉼표로 구분)</div>
      <input type="text" id="task-tags" placeholder="예) React, TypeScript, API" />
      <div class="form-bottom">
        <label class="attach-label">
          <span class="attach-icon">📎</span>
          <span>이미지 첨부</span>
          <input type="file" id="task-image" accept="image/*" style="display:none" />
        </label>
        <span id="task-file-name" class="file-name"></span>
        <button class="btn-primary" onclick="addTask()">+ 추가하기</button>
      </div>
    </div>

    <div class="filters">
      <button class="fbtn on" onclick="filterTasks('전체', this)">전체</button>
      <button class="fbtn" onclick="filterTasks('대기', this)">대기</button>
      <button class="fbtn" onclick="filterTasks('진행중', this)">진행중</button>
      <button class="fbtn" onclick="filterTasks('완료', this)">완료</button>
    </div>

    <div id="tasks-list"></div>
  </div>

  <!-- ===== 개발 히스토리 ===== -->
  <div id="section-history" style="display:none">

    <div class="form-card">
      <div class="form-card-title">히스토리 직접 추가</div>
      <div class="form-row">
        <div>
          <div class="form-label">유형</div>
          <select id="type" onchange="onTypeChange()">
            <option value="기능개발">기능개발</option>
개발</option>
  <option value="장애내역">장애내역</option>
          </select>
        </div>
        <div>
          <div class="form-label">시작일</div>
          <input type="date" id="date-start" />
        </div>
        <div id="date-end-wrap">
          <div class="form-label">종료일</div>
          <input type="date" id="date-end" />
        </div>
      </div>
      <div class="form-label">제목</div>
      <input type="text" id="title" placeholder="어떤 작업을 했나요?" />
      <div class="form-label">설명</div>
      <textarea id="description" placeholder="작업 내용, 이슈 원인, 해결 방법 등을 자유롭게 기록해봐요"></textarea>
      <div class="form-label">태그 (쉼표로 구분)</div>
      <input type="text" id="tags" placeholder="예) WPF, MVVM, DataGrid" />
      <div class="form-bottom">
        <label class="attach-label">
          <span class="attach-icon">📎</span>
          <span>이미지 첨부</span>
          <input type="file" id="image" accept="image/*" style="display:none" />
        </label>
        <span id="file-name" class="file-name"></span>
        <button class="btn-primary" onclick="addRecord()">+ 저장하기</button>
      </div>
    </div>

    <div class="filters">
      <button class="fbtn on" onclick="filterRecords('전체', this)">전체</button>
      <button class="fbtn" onclick="filterRecords('기능개발', this)">기능개발</button>
      <button class="fbtn" onclick="filterRecords('버그수정', this)">버그수정</button>
      <button class="fbtn" onclick="filterRecords('CS응대', this)">CS응대</button>
      <button class="fbtn" onclick="filterRecords('장애내역', this)">장애내역</button>
    </div>

    <div id="records-list"></div>
  </div>

  <!-- 완료 처리 모달 -->
  <div id="complete-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">🎉 완료 처리</div>
        <div class="modal-sub">개발 히스토리에 자동으로 기록돼요</div>
      </div>
      <div class="form-label" style="margin-top:18px">완료 메모 <span class="optional">(선택)</span></div>
      <textarea id="complete-note" placeholder="완료하면서 특이사항, 결과 등을 메모해봐요" style="height:80px"></textarea>
      <div class="form-label">완료 이미지 첨부 <span class="optional">(선택)</span></div>
      <label class="attach-label">
        <span class="attach-icon">📷</span>
        <span>이미지 선택</span>
        <input type="file" id="complete-image" accept="image/*" style="display:none" />
      </label>
      <span id="complete-file-name" class="file-name" style="display:block;margin-top:6px"></span>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeCompleteModal()">취소</button>
        <button class="btn-confirm" onclick="submitComplete()">완료 처리 →</button>
iv>
    </div>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>

  <script src="app.js"></script>
</body>
</html>
